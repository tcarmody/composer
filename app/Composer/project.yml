name: Composer
options:
  bundleIdPrefix: com.tcarmody
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    DEAD_CODE_STRIPPING: YES

targets:
  Composer:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Composer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tcarmody.composer
        PRODUCT_NAME: Composer
        INFOPLIST_FILE: Composer/Info.plist
        CODE_SIGN_ENTITLEMENTS: Composer/Composer.entitlements
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Composer/Info.plist
      properties:
        CFBundleDisplayName: Composer
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: ""
        NSMainStoryboardFile: ""
        LSApplicationCategoryType: public.app-category.productivity

schemes:
  Composer:
    build:
      targets:
        Composer: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
